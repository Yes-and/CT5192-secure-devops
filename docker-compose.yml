services:
    backend-flask:
        image: vkol1/lms-backend:2.0.0
        ports:
            - "4000:4000"
        environment:
            - FLASK_ENV=development
            - FLASK_APP=app.py

    frontend:
        image: vkol1/lms-frontend:2.0.0 # Replace with your Docker Hub username yeah
        pull_policy: always
        ports:
            - "80:80"
        depends_on:
            - backend-flask
        networks:
            - app-network

networks:
    app-network:
        driver: bridge
